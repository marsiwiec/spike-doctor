name: Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pyinstaller SpikeDoctor.spec
      - run: |
          cd dist
          Compress-Archive -Path SpikeDoctor -DestinationPath ../SpikeDoctor-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: SpikeDoctor-windows
          path: SpikeDoctor-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pyinstaller SpikeDoctor.spec
      - run: |
          cd dist
          zip -r ../SpikeDoctor-macos.zip SpikeDoctor
      - uses: actions/upload-artifact@v4
        with:
          name: SpikeDoctor-macos
          path: SpikeDoctor-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pyinstaller SpikeDoctor.spec
      - run: |
          cd dist
          zip -r ../SpikeDoctor-linux.zip SpikeDoctor
      - uses: actions/upload-artifact@v4
        with:
          name: SpikeDoctor-linux
          path: SpikeDoctor-linux.zip

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          TAG=${GITHUB_REF_NAME}
          docker build -t ghcr.io/${{ github.repository }}:${TAG} .
          docker push ghcr.io/${{ github.repository }}:${TAG}
          docker tag ghcr.io/${{ github.repository }}:${TAG} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest

  attach-artifacts:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" artifacts/*.zip --clobber
