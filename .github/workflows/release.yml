name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pyinstaller SpikeDoctor.spec
      - run: Rename-Item -Path dist/SpikeDoctor.exe -NewName SpikeDoctor-windows-x64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: SpikeDoctor-windows-x64
          path: dist/SpikeDoctor-windows-x64.exe

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pyinstaller SpikeDoctor.spec
      - run: mv dist/SpikeDoctor SpikeDoctor-macos-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: SpikeDoctor-macos-arm64
          path: SpikeDoctor-macos-arm64.dmg

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - run: uv sync --dev
      - run: uv run pyinstaller SpikeDoctor.spec
      - run: mv dist/SpikeDoctor SpikeDoctor-linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: SpikeDoctor-linux-x64
          path: SpikeDoctor-linux-x64

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        run: |
          TAG=${GITHUB_REF_NAME}
          docker build -t ghcr.io/${{ github.repository }}:${TAG} .
          docker push ghcr.io/${{ github.repository }}:${TAG}
          docker tag ghcr.io/${{ github.repository }}:${TAG} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest

  attach-artifacts:
    needs: [build-windows-x64, build-macos-arm64, build-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes 2>/dev/null || true
          gh release upload "${GITHUB_REF_NAME}" artifacts/SpikeDoctor-* --clobber
